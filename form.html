<!DOCTYPE html>
<html>
<head>
    <title>Modern Registration</title>
    <style>
        body { background: #e0eafc; background: linear-gradient(to right, #cfdef3, #e0eafc); font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .form-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 400px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        input[type="submit"] { background: #302b63; color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        input[type="submit"]:hover { background: #ff0080; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="color:#302b63">Join the Club</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="password" placeholder="Secure Password" required>
            <label>Gender:</label>
            <input type="radio" name="g" style="width:auto"> M <input type="radio" name="g" style="width:auto"> F <br>
            <label>Subscribed?</label> <input type="checkbox" style="width:auto"> Yes
            <select><option>Select City</option><option>New York</option><option>Mumbai</option></select>
            <label>Profile Pic:</label><input type="file">
            <textarea placeholder="Tell us about yourself..."></textarea>
            <input type="submit" value="Sign Up">
            <input type="reset" value="Reset" style="background:#ddd; color:#333;">
        </form>
        <p align="center"><a href="index.html" style="color:#302b63">Return Home</a></p>
    </div>
</body>
</html>
