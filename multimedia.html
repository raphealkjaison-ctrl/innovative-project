<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Experience</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .img-container { position: relative; display: inline-block; }
        img { border-radius: 20px; border: 4px solid #333; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        img:hover { transform: scale(1.05); border-color: #00d2ff; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #00d2ff; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Visual Showcase</h2>
    <p>Using the <code>&lt;img&gt;</code> tag with custom dimensions and hovering effects.</p>
    <div class="img-container">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=600&h=350" alt="Technology Image" width="600" height="350">
    </div>
    <br>
    <a href="index.html" class="back-btn">Back to Home</a>
</body>
</html>
